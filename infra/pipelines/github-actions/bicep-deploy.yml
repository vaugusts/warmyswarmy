name: Deploy Infrastructure with Bicep

on:
  push:
    branches:
      - main
    paths:
      - 'infra/bicep/**'
      - '.github/workflows/bicep-deploy.yml'
  pull_request:
    branches:
      - main
    paths:
      - 'infra/bicep/**'
  workflow_dispatch:
    inputs:
      environment:
        description: 'Environment to deploy'
        required: true
        default: 'dev'
        type: choice
        options:
          - dev
          - prod

env:
  AZURE_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
  RESOURCE_GROUP_NAME: rg-${{ github.event.inputs.environment || 'dev' }}-infra

permissions:
  id-token: write
  contents: read

jobs:
  validate:
    name: Validate Bicep Templates
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Azure Login (Federated)
        uses: azure/login@v1
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
          enable-AzureRM-MSI-auth: true

      - name: Validate Bicep Template
        run: |
          az bicep build --file infra/bicep/main.bicep --outdir /tmp
          az deployment group validate \
            --resource-group $RESOURCE_GROUP_NAME \
            --template-file infra/bicep/main.bicep \
            --parameters infra/bicep/parameters/${{ github.event.inputs.environment || 'dev' }}.bicepparam \
            --mode Complete

      - name: Security Scan (Checkov)
        run: |
          pip install checkov
          checkov -d infra/bicep --framework bicep --compact || true

  what-if:
    name: Terraform Plan (What-If)
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@v4

      - name: Azure Login
        uses: azure/login@v1
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Run What-If Deployment
        run: |
          az deployment group what-if \
            --resource-group $RESOURCE_GROUP_NAME \
            --template-file infra/bicep/main.bicep \
            --parameters infra/bicep/parameters/${{ github.event.inputs.environment || 'dev' }}.bicepparam

  deploy:
    name: Deploy Infrastructure
    runs-on: ubuntu-latest
    needs: validate
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    environment:
      name: ${{ github.event.inputs.environment || 'dev' }}
      url: https://portal.azure.com
    steps:
      - uses: actions/checkout@v4

      - name: Azure Login
        uses: azure/login@v1
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Create Resource Group
        run: |
          az group create \
            --name $RESOURCE_GROUP_NAME \
            --location eastus \
            --tags Environment=${{ github.event.inputs.environment || 'dev' }} ManagedBy=GitHub

      - name: Deploy Bicep Template
        run: |
          az deployment group create \
            --resource-group $RESOURCE_GROUP_NAME \
            --template-file infra/bicep/main.bicep \
            --parameters infra/bicep/parameters/${{ github.event.inputs.environment || 'dev' }}.bicepparam \
            --mode Complete \
            --verbose

      - name: Verify Deployment
        run: |
          az deployment group show \
            --resource-group $RESOURCE_GROUP_NAME \
            --name main \
            --query "properties.outputs" \
            --output json

      - name: Export Outputs
        run: |
          az deployment group show \
            --resource-group $RESOURCE_GROUP_NAME \
            --name main \
            --query "properties.outputs" \
            --output json > deployment-outputs.json

      - name: Upload Deployment Outputs
        uses: actions/upload-artifact@v3
        with:
          name: deployment-outputs
          path: deployment-outputs.json
          retention-days: 30

  notify:
    name: Send Notification
    runs-on: ubuntu-latest
    needs: deploy
    if: always()
    steps:
      - name: Comment on PR
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: '✅ Infrastructure deployment workflow completed. Check the deployment outputs in the artifacts.'
            })

      - name: Slack Notification
        if: failure()
        uses: slackapi/slack-github-action@v1
        with:
          webhook-url: ${{ secrets.SLACK_WEBHOOK }}
          payload: |
            {
              "text": "❌ Infrastructure deployment failed in ${{ github.event.inputs.environment || 'dev' }}",
              "blocks": [
                {
                  "type": "section",
                  "text": {
                    "type": "mrkdwn",
                    "text": "*Deployment Failed*\nEnvironment: ${{ github.event.inputs.environment || 'dev' }}\nRun: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
                  }
                }
              ]
            }
